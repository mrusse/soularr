<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soularr Web UI</title>
    <link rel="icon" href="/resources/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
</head>
<body>
    <header>
        <div class="header-brand">
            <picture>
                <source srcset="/resources/logo.png" media="(pointer: coarse) and (hover: none), (max-width: 768px)">
                <img src="/resources/banner.png" alt="Soularr">
            </picture>
        </div>
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
            <span class="icon icon-menu"></span>
        </button>
        <div class="divider"></div>
        <span class="header-title">Web UI</span>
        <div class="header-links">
            <a href="https://github.com/mrusse/soularr" target="_blank" title="GitHub">
                <span class="icon icon-github"></span>
            </a>
            <a href="https://github.com/sponsors/mrusse" target="_blank" title="Sponsor">
                <span class="icon icon-sponsor"></span>
            </a>
        </div>
    </header>

    <div class="layout">
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <nav class="sidebar">
            <button class="nav-btn active" onclick="showView('logs', this)">
                <span class="icon icon-logs"></span>
                Logs
            </button>
            <button class="nav-btn" onclick="showView('failed-imports', this)">
                <span class="icon icon-ban"></span>
                Failed Imports
            </button>
            <button class="nav-btn" onclick="showView('settings', this)">
                <span class="icon icon-settings"></span>
                Settings
            </button>
        </nav>

        <div class="content">
            <div id="view-logs" class="view active">
                <div class="log-toolbar">
                    <button id="scroll-btn" class="toolbar-btn active" onclick="toggleScroll()">Auto-scroll</button>
                    <button class="toolbar-btn" onclick="clearLog()">Clear</button>
                    <div class="toolbar-spacer"></div>
                </div>
                <div id="log"></div>
            </div>

            <div id="view-failed-imports" class="view">
                <div class="log-toolbar">
                    <button class="toolbar-btn" onclick="loadFailedImports()">Refresh</button>
                    <span id="failed-imports-count" class="settings-path"></span>
                </div>
                <div class="failed-imports-wrap">
                    <table class="failed-imports-table">
                        <thead>
                            <tr>
                                <th>Artist</th>
                                <th>Album</th>
                                <th>Failed At</th>
                            </tr>
                        </thead>
                        <tbody id="failed-imports-body">
                        </tbody>
                    </table>
                    <div id="failed-imports-empty" class="failed-imports-empty" style="display:none">No failed imports.</div>
                </div>
            </div>

            <div id="view-settings" class="view">
                <div class="settings-toolbar">
                    <button id="save-btn" class="toolbar-btn" onclick="saveConfig()">Save</button>
                    <span class="settings-path" id="config-path"></span>
                </div>
                <div id="editor-wrap">
                    <textarea id="config-editor" spellcheck="false"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/properties/properties.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
